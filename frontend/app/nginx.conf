server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html — forces browser to always fetch fresh asset filenames
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Hashed assets (JS/CSS) can be cached long-term — filenames change on rebuild
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check
    location /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
